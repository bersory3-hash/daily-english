name: Daily Kakao English Message

on:
  schedule:
    # 매일 22:45 UTC = 07:45 KST (다음날).
    # 정각(:00)은 전 세계 예약이 몰려 지연이 잦으므로, 07:45로 당겨
    # 지연이 생겨도 아침 8시 전후에 도착하도록 합니다.
    - cron: "45 22 * * *"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kakao
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Send today's message
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REFRESH_TOKEN_2: ${{ secrets.KAKAO_REFRESH_TOKEN_2 }}
          ADMIN_GH_TOKEN: ${{ secrets.ADMIN_GH_TOKEN }}
        run: node send-daily-message.mjs
